<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quizapp</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <link rel="stylesheet" href="style.css" />
        <script src="./scripts/db.js"></script>
        <script src="./scripts/templates.js"></script>
        <script src="script.js"></script>
    </head>
    <body onload="init()">
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">QuizApp</span>
            </div>
        </nav>

        <div class="container">
            <div class="card quiz-card">
                <img id="header-img" src="./assets/img/quiz-bg.jpg" class="card-img-top" alt="green questionmark" />
                <div class="progress">
                    <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 25%">25%</div>
                </div>
                <div id="question-body" class="card-body"></div>
                <div id="endscreen" class="card-body d-none">
                    <div class="text-center finished-headline">Quiz finished!</div>
                    <div class="text-center">
                        You scored <span id="score"></span> from <span id="total-answers"></span> points!
                    </div>
                    <div class="button-row">
                        <button id="button-again" type="button" class="btn btn-primary" onclick="playAgain()">
                            Play Again
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
